{% extends "base.html" %}

{% block content %}
<h2>History</h2>
<section class="card">
  <label for="limitInput">Rows:</label>
  <input id="limitInput" type="number" min="1" max="200" value="50" />
  <button id="loadHistoryBtn">Load</button>
  <table>
    <thead>
      <tr><th>Time</th><th>UV</th><th>Risk</th></tr>
    </thead>
    <tbody id="historyBody"></tbody>
  </table>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
